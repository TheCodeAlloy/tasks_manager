<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Správce úkolů</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0f;color:#f0f0f5;font-family:system-ui,sans-serif;max-width:500px;margin:0 auto;padding-bottom:80px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;color-scheme:dark;}

/* Header */
.hdr{padding:16px 16px 10px;border-bottom:1px solid #1e1e2e;position:sticky;top:0;background:#0a0a0f;z-index:10;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hdr-title{font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.hdr-stat{font-size:17px;font-weight:700;}
.tabs{display:flex;gap:6px;margin-bottom:7px;}
.tab{flex:1;padding:7px 0;border-radius:9px;font-size:13px;font-weight:600;border:1px solid #1e1e2e;background:transparent;color:#555;}
.tab.on{background:#1e1e3f;border-color:#3a3a6e;color:#a0a0ff;}
.ftabs{display:flex;gap:6px;}
.ftab{flex:1;padding:5px 0;border-radius:7px;font-size:12px;border:none;background:transparent;color:#444;}
.ftab.on{background:#1a1a1a;color:#ddd;}
.btn-sm{background:#111;border:1px solid #2a2a3e;color:#555;border-radius:20px;padding:5px 12px;font-size:11px;}
.btn-sm.on{background:#1e2a1e;color:#22c55e;}

/* Task card */
.content{padding:12px 16px 0;}
.task{border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;}
.task-proj{font-size:11px;color:#444;margin-bottom:2px;}
.task-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.task-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;border-radius:5px;padding:2px 7px;font-weight:600;}
.task-row{display:flex;justify-content:space-between;align-items:flex-start;}
.chk{width:28px;height:28px;border-radius:50%;border:2px solid #333;background:transparent;color:#22c55e;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px;}
.chk.on{border-color:#22c55e;background:rgba(34,197,94,.13);}
.empty{text-align:center;padding:50px 0;color:#2a2a3a;}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#2a2a6e,#3a3aae);border:none;color:#fff;font-size:28px;box-shadow:0 4px 20px rgba(100,100,220,.4);display:flex;align-items:center;justify-content:center;z-index:20;}

/* Screen */
.screen{min-height:100vh;background:#0a0a0f;padding:18px 16px 80px;max-width:500px;margin:0 auto;}
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-row.between{justify-content:space-between;}
.back{background:none;border:none;color:#666;font-size:22px;}
.screen-title{font-size:18px;font-weight:700;}

/* Form */
.fld{margin-bottom:12px;}
.fld-lbl{font-size:10px;color:#555;margin-bottom:4px;letter-spacing:.5px;}
.inp{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#f0f0f5;font-size:14px;font-family:inherit;}
.inp:focus{outline:none;border-color:#4a4a8e;}
.inp.muted{color:#888;}
.inp.big{font-size:15px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.fl{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;padding:12px 0;border-radius:10px;background:transparent;border:1px solid #333;color:#666;font-size:14px;}
.btn-save{flex:2;padding:12px 0;border-radius:10px;background:linear-gradient(135deg,#1a3a1a,#2a5a2a);border:1px solid #3a7a3a;color:#4ade80;font-size:14px;font-weight:700;}
.btn-analyze{width:100%;padding:12px 0;background:#2a2a6e;border:1px solid #3a3a8e;border-radius:10px;color:#a0a0ff;font-size:14px;font-weight:600;margin-top:10px;}
.btn-manual{width:100%;padding:11px 0;background:transparent;border:1px solid #222;border-radius:10px;color:#444;font-size:13px;margin-top:8px;}

/* Voice box */
.vbox{background:#111;border:1px solid #2a2a4a;border-radius:14px;padding:16px;margin-bottom:14px;}
.vbox-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
.vtextarea{width:100%;background:#0d0d1a;border:1px solid #2a2a3e;border-radius:10px;padding:12px;color:#f0f0f5;font-size:15px;font-family:inherit;resize:none;min-height:90px;line-height:1.5;}
.vtextarea:focus{outline:none;border-color:#4a4a8e;}
.vhint{font-size:11px;color:#333;margin-top:8px;line-height:1.8;}
.vhint b{color:#555;}
.ai-lbl{font-size:11px;color:#22c55e;letter-spacing:1px;margin-bottom:12px;}

/* Detail */
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.sbtn{padding:7px 12px;border-radius:20px;font-size:12px;border:1px solid #222;background:transparent;color:#555;}
.sbtn.on{background:#1e1e3f;border-color:#3a3a6e;color:#a0a0ff;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.dcell{background:#111;border:1px solid #1e1e2e;border-radius:10px;padding:12px;}
.dcell-lbl{font-size:10px;color:#444;margin-bottom:4px;text-transform:uppercase;}

/* Dup box */
.dup-box{background:#1a1a0a;border:1px solid #5a5a1a;border-radius:12px;padding:14px;margin-bottom:14px;}
.dup-item{background:#111;border-radius:8px;padding:10px;margin-bottom:8px;}

/* Error */
.err{background:#1f0a0a;border:1px solid #5a1a1a;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#f87171;}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:#333;font-size:14px;}
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ Načítám...</div></div>
<script>
// ══════════════════════════════════
// NASTAV SVOJI URL:
const API = 'https://script.google.com/macros/s/AKfycbxQj36w1AQ2SxkTDuzla1L8SNzFA2cjnmKtVD9tVpb8pk0HhObhKJGSSaW11ieWyFoG8g/exec';
// ══════════════════════════════════

const ST = {todo:'📋 Čeká',inprogress:'🔄 Rozpracováno',waiting:'⏳ Čekám',done:'✅ Hotovo'};
const SK = ['todo','inprogress','waiting','done'];
const PC = {h:'#ef4444',m:'#f59e0b',l:'#22c55e'};
const pc = p => p>=8?'h':p>=4?'m':'l';

// State
let tasks=[], screen='list', sel=null, editMode=false;
let tf='all', yf='all', showDone=false;
let voiceText='', draft=null, dups=[], manual=false, parsing=false;
let voiceEditText='', errMsg='', loading=false;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(iso){
  if(!iso)return null;
  const d=new Date(iso),diff=Math.round((d-new Date())/86400000);
  if(diff===0)return'Dnes';if(diff===1)return'Zítra';if(diff<0)return`Před ${-diff}d`;
  return d.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
}
const isToday=iso=>iso&&new Date(iso).toDateString()===new Date().toDateString();
const isWeek=iso=>{if(!iso)return false;const d=new Date(iso),n=new Date(),e=new Date();e.setDate(n.getDate()+7);return d>=n&&d<=e;};

// API — GET only, no CORS issues
async function api(action, data={}) {
  let url = API + '?action=' + action;
  Object.keys(data).forEach(k => {
    const v = data[k];
    if(v !== undefined && v !== null) {
      url += '&' + k + '=' + encodeURIComponent(typeof v==='object'?JSON.stringify(v):v);
    }
  });
  const res = await fetch(url, {redirect:'follow'});
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { return {ok:false, error:'Chyba odpovědi: '+text.substring(0,200)}; }
}

async function loadTasks() {
  loading=true; render();
  const r = await api('getTasks');
  if(r.ok) tasks = r.tasks||[];
  else errMsg = r.error||'Chyba načítání';
  loading=false; render();
}

// Task operations
async function saveTask() {
  if(!draft) return;
  loading=true; render();
  const r = await api('addTask', {task: draft});
  if(r.ok) {
    await loadTasks();
    draft=null; dups=[]; voiceText=''; manual=false; errMsg=''; screen='list';
  } else errMsg = r.error||'Chyba uložení';
  loading=false; render();
}

async function saveEdit() {
  if(!draft||!draft.id) return;
  loading=true; render();
  const r = await api('updateTask', {task: draft});
  if(r.ok) { await loadTasks(); editMode=false; draft=null; errMsg=''; }
  else errMsg = r.error||'Chyba uložení';
  loading=false; render();
}

async function updateDup(id) {
  if(!draft) return;
  loading=true; render();
  const r = await api('updateTask', {task: {...draft, id}});
  if(r.ok) { await loadTasks(); draft=null; dups=[]; voiceText=''; screen='list'; errMsg=''; }
  else errMsg = r.error;
  loading=false; render();
}

async function quickStatus(id, e) {
  e.stopPropagation();
  const next={todo:'inprogress',inprogress:'waiting',waiting:'done',done:'todo'};
  const t = tasks.find(x=>String(x.id)===String(id));
  if(!t) return;
  tasks = tasks.map(x=>String(x.id)===String(id)?{...x,status:next[x.status]||'todo'}:x);
  render();
  await api('updateTask', {task: {...t, status: next[t.status]||'todo'}});
}

async function setStatus(id, s) {
  const t = tasks.find(x=>String(x.id)===String(id));
  if(!t) return;
  tasks = tasks.map(x=>String(x.id)===String(id)?{...x,status:s}:x);
  render();
  await api('updateTask', {task: {...t, status: s}});
}

async function delTask(id) {
  if(!confirm('Smazat úkol?')) return;
  loading=true; render();
  await api('deleteTask', {id});
  await loadTasks();
  screen='list'; loading=false; render();
}

async function doAnalyze() {
  if(!voiceText.trim()){errMsg='Napiš nebo nadiktuj text úkolu.';render();return;}
  parsing=true; errMsg=''; render();
  const r = await api('analyze', {text: voiceText});
  parsing=false;
  if(r.ok) {
    const p = r.task;
    dups = (p.duplicateIds||[]).map(id=>tasks.find(t=>String(t.id)===String(id))).filter(Boolean);
    draft = {...p, duplicateIds:undefined};
    errMsg='';
  } else errMsg = r.error||'Chyba AI';
  render();
}

async function doEditAnalyze(taskId) {
  if(!voiceEditText.trim()){errMsg='Napiš příkaz.';render();return;}
  const t = tasks.find(x=>String(x.id)===String(taskId));
  if(!t) return;
  parsing=true; errMsg=''; render();
  const r = await api('analyzeEdit', {task: t, command: voiceEditText});
  parsing=false;
  if(r.ok) {
    draft = {...t, ...r.task, id: t.id};
    const upd = await api('updateTask', {task: draft});
    if(upd.ok) { await loadTasks(); voiceEditText=''; sel=t.id; }
    else errMsg = upd.error;
  } else errMsg = r.error;
  render();
}

// Draft editor — no re-render for text fields
function ed(f,v) {
  if(!draft) return;
  draft[f] = v;
  if(f==='type'||f==='status') render();
  if(f==='priority') {
    const el=document.getElementById('prioLbl');
    if(el) el.textContent='PRIORITA: '+v+'/10';
    const sl=document.getElementById('prioSlider');
    if(sl) sl.style.accentColor=PC[pc(+v)];
  }
}

function openManual() {
  manual=true;
  draft={title:'',detail:'',project:'',type:'mine',priority:5,status:'todo',dueDate:'',deadline:'',reminderDate:'',estimatedHours:'',assignee:''};
  render();
}

function openDetail(id) { sel=id; screen='detail'; voiceEditText=''; errMsg=''; render(); }
function openAdd() { draft=null; voiceText=''; manual=false; dups=[]; errMsg=''; screen='add'; render(); }

// Filter & sort
function filtered() {
  return tasks.filter(t=>{
    if(!showDone&&t.status==='done') return false;
    if(yf==='mine'&&t.type!=='mine') return false;
    if(yf==='watch'&&t.type!=='watch') return false;
    if(tf==='today'&&!isToday(t.dueDate)&&!isToday(t.deadline)) return false;
    if(tf==='week'&&!isWeek(t.dueDate)&&!isWeek(t.deadline)) return false;
    return true;
  }).sort((a,b)=>{
    if(a.status==='done'&&b.status!=='done') return 1;
    if(a.status!=='done'&&b.status==='done') return -1;
    return b.priority-a.priority;
  });
}

// Form HTML
function formHTML(saveAction, cancelAction) {
  if(!draft) return '';
  const d=draft;
  const col=PC[pc(d.priority||5)];
  return `
  <div class="fld"><div class="fld-lbl">NÁZEV</div>
    <input class="inp big" value="${esc(d.title)}" oninput="ed('title',this.value)">
  </div>
  <div class="fld"><div class="fld-lbl">PROJEKT</div>
    <input class="inp" value="${esc(d.project)}" placeholder="Název projektu..." oninput="ed('project',this.value)">
  </div>
  <div class="fld"><div class="fld-lbl">DETAIL</div>
    <textarea class="inp muted" rows="3" oninput="ed('detail',this.value)">${esc(d.detail||'')}</textarea>
  </div>
  <div class="grid2">
    <div><div class="fld-lbl">TYP</div>
      <select class="inp" onchange="ed('type',this.value)">
        <option value="mine"${d.type==='mine'?' selected':''}>🔵 Udělám sám</option>
        <option value="watch"${d.type==='watch'?' selected':''}>🟡 Hlídám</option>
      </select>
    </div>
    <div><div class="fld-lbl">STAV</div>
      <select class="inp" onchange="ed('status',this.value)">
        ${SK.map(k=>`<option value="${k}"${d.status===k?' selected':''}>${ST[k]}</option>`).join('')}
      </select>
    </div>
  </div>
  ${d.type==='watch'?`<div class="fld"><div class="fld-lbl">KDO TO DĚLÁ</div><input class="inp" value="${esc(d.assignee||'')}" oninput="ed('assignee',this.value)"></div>`:''}
  <div class="fld">
    <div class="fld-lbl" id="prioLbl">PRIORITA: ${d.priority||5}/10</div>
    <input id="prioSlider" type="range" min="1" max="10" value="${d.priority||5}" style="width:100%;accent-color:${col}" oninput="ed('priority',+this.value)">
  </div>
  <div class="grid2">
    <div><div class="fld-lbl">TERMÍN</div>
      <input type="date" class="inp" value="${d.dueDate||''}" onclick="this.showPicker&&this.showPicker()" onchange="ed('dueDate',this.value)">
    </div>
    <div><div class="fld-lbl">DEADLINE</div>
      <input type="date" class="inp" value="${d.deadline||''}" onclick="this.showPicker&&this.showPicker()" onchange="ed('deadline',this.value)">
    </div>
  </div>
  <div class="grid2">
    <div><div class="fld-lbl">PŘIPOMENUTÍ</div>
      <input type="date" class="inp" value="${d.reminderDate||''}" onclick="this.showPicker&&this.showPicker()" onchange="ed('reminderDate',this.value)">
    </div>
    <div><div class="fld-lbl">ODH. ČAS (h)</div>
      <input type="number" class="inp" min="0" step="0.5" value="${d.estimatedHours||''}" oninput="ed('estimatedHours',this.value)">
    </div>
  </div>
  <div class="fl">
    <button class="btn-cancel" onclick="${cancelAction}">Zrušit</button>
    <button class="btn-save" onclick="${saveAction}">✓ Uložit</button>
  </div>`;
}

// Render
function render() {
  const app=document.getElementById('app');
  if(loading){app.innerHTML='<div class="loading">⏳ Načítám...</div>';return;}
  if(screen==='list'){app.innerHTML=renderList();return;}
  if(screen==='add'){app.innerHTML=renderAdd();return;}
  if(screen==='detail'){app.innerHTML=renderDetail();return;}
}

function renderList() {
  const list=filtered();
  const todayN=tasks.filter(t=>t.status!=='done'&&(isToday(t.dueDate)||isToday(t.deadline))).length;
  const activeN=tasks.filter(t=>t.status!=='done').length;

  const cards=list.length===0
    ?`<div class="empty"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="color:#444">Žádné úkoly</div><div style="font-size:12px;color:#222;margin-top:4px">Ťukni + pro přidání</div></div>`
    :list.map(t=>{
      const col=PC[pc(t.priority)];
      const overdue=(t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='done')||(t.dueDate&&new Date(t.dueDate)<new Date()&&!isToday(t.dueDate)&&t.status!=='done');
      const date=t.deadline||t.dueDate;
      return `<div class="task" style="background:${t.status==='done'?'#0d0d0d':'#111118'};border:1px solid ${overdue?'#5a1a1a':'#1e1e2e'};border-left:3px solid ${t.status==='done'?'#222':col};opacity:${t.status==='done'?.45:1}" onclick="openDetail('${t.id}')">
        <div class="task-row">
          <div style="flex:1;min-width:0">
            ${t.project?`<div class="task-proj">${esc(t.project)}</div>`:''}
            <div class="task-title" style="color:${t.status==='done'?'#444':'#f0f0f5'};text-decoration:${t.status==='done'?'line-through':'none'}">${t.type==='mine'?'🔵':'🟡'} ${esc(t.title)}</div>
            <div class="task-tags">
              <span class="tag" style="color:${col};background:${col}18">P${t.priority}</span>
              <span class="tag" style="color:#555;background:#ffffff08">${ST[t.status]}</span>
              ${date?`<span class="tag" style="color:${overdue?'#ef4444':'#666'};background:#ffffff08">📅 ${fmt(date)}</span>`:''}
            </div>
          </div>
          <button class="chk${t.status==='done'?' on':''}" onclick="quickStatus('${t.id}',event)">${t.status==='done'?'✓':''}</button>
        </div>
      </div>`;
    }).join('');

  return `
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">Správce úkolů</div>
        <div class="hdr-stat">${todayN>0?`<span style="color:#ef4444">${todayN} dnes · </span>`:''}<span style="color:#555">${activeN} aktivních</span></div>
      </div>
      <button class="btn-sm${showDone?' on':''}" onclick="showDone=!showDone;render()">${showDone?'✓ Hotové':'Hotové'}</button>
    </div>
    <div class="tabs">
      ${[['today','Dnes'],['week','Týden'],['all','Vše']].map(([v,l])=>`<button class="tab${tf===v?' on':''}" onclick="tf='${v}';render()">${l}</button>`).join('')}
    </div>
    <div class="ftabs">
      ${[['all','Všechny'],['mine','🔵 Moje'],['watch','🟡 Hlídám']].map(([f,l])=>`<button class="ftab${yf===f?' on':''}" onclick="yf='${f}';render()">${l}</button>`).join('')}
    </div>
  </div>
  ${errMsg?`<div class="content"><div class="err">${esc(errMsg)}</div></div>`:''}
  <div class="content">${cards}</div>
  <button class="fab" onclick="openAdd()">+</button>`;
}

function renderAdd() {
  let body='';
  if(!draft&&!manual) {
    body=`
    <div class="vbox">
      <div class="vbox-title">🎙 Zadej úkol hlasem nebo textem</div>
      <textarea class="vtextarea" placeholder="Napiš nebo nadiktuj přirozeně...&#10;Např: Zavolat Novákovi do pátku ohledně smlouvy, priorita vysoká&#10;Nebo: Zkontrolovat jestli Martin odevzdal zprávu příští týden" oninput="voiceText=this.value">${esc(voiceText)}</textarea>
      <div class="vhint">📱 <b>Mobil:</b> ťukni → mikrofon 🎤 na klávesnici &nbsp;|&nbsp; 💻 <b>Win+H</b></div>
      <button class="btn-analyze" onclick="doAnalyze()" ${parsing?'disabled':''}>${parsing?'⏳ Analyzuji...':'✨ Analyzovat AI'}</button>
    </div>
    ${errMsg?`<div class="err">${esc(errMsg)}</div>`:''}
    <button class="btn-manual" onclick="openManual()">✏️ Zadat ručně bez AI</button>`;

  } else if(dups.length>0&&draft) {
    body=`
    <div class="dup-box">
      <div style="font-size:12px;color:#f59e0b;margin-bottom:10px">⚠️ Podobný úkol již existuje:</div>
      ${dups.map(d=>`<div class="dup-item">
        <div style="font-size:14px;font-weight:600;margin-bottom:2px">${esc(d.title)}</div>
        <div style="font-size:12px;color:#666;margin-bottom:8px">${ST[d.status]} · P${d.priority} · ${esc(d.project)}</div>
        <button class="btn-save" style="padding:8px 0;font-size:13px;width:100%" onclick="updateDup('${d.id}')">Aktualizovat tento úkol</button>
      </div>`).join('')}
      <button class="btn-cancel" style="width:100%;padding:8px 0;font-size:13px;margin-top:6px" onclick="dups=[];render()">Přidat jako nový úkol</button>
    </div>`;
  } else if(draft) {
    body=`
    ${!manual?'<div class="ai-lbl">✨ AI NAVRHUJE — uprav pokud potřebuješ</div>':''}
    ${errMsg?`<div class="err">${esc(errMsg)}</div>`:''}
    ${formHTML('saveTask()','draft=null;dups=[];manual=false;voiceText="";errMsg="";render()')}`;
  }

  return `<div class="screen">
    <div class="back-row">
      <button class="back" onclick="screen='list';draft=null;voiceText='';manual=false;dups=[];errMsg='';render()">←</button>
      <div class="screen-title">Nový úkol</div>
    </div>
    ${body}
  </div>`;
}

function renderDetail() {
  const task=tasks.find(t=>String(t.id)===String(sel));
  if(!task){screen='list';render();return'';}
  const col=PC[pc(task.priority)];

  if(editMode&&draft) {
    return `<div class="screen">
      <div class="back-row">
        <button class="back" onclick="editMode=false;draft=null;errMsg='';render()">←</button>
        <div class="screen-title">Upravit úkol</div>
      </div>
      ${errMsg?`<div class="err">${esc(errMsg)}</div>`:''}
      ${formHTML('saveEdit()','editMode=false;draft=null;errMsg="";render()')}
    </div>`;
  }

  const cells=[
    ['Priorita',`${task.priority}/10`,col],
    task.dueDate?['Termín',fmt(task.dueDate),'#888']:null,
    task.deadline?['Deadline',fmt(task.deadline),'#ef4444']:null,
    task.reminderDate?['Připomenutí',fmt(task.reminderDate),'#a0a0ff']:null,
    task.estimatedHours?['Odh. čas',`${task.estimatedHours}h`,'#888']:null,
  ].filter(Boolean);

  return `<div class="screen">
    <div class="back-row between">
      <button class="back" onclick="screen='list';voiceEditText='';errMsg='';render()">←</button>
      <div style="display:flex;gap:8px">
        <button style="background:#1a1a2e;border:1px solid #3a3a6e;color:#a0a0ff;border-radius:8px;padding:6px 14px;font-size:13px" onclick="draft={...tasks.find(t=>String(t.id)==='${task.id}')};editMode=true;render()">✏️ Upravit</button>
        <button style="background:#1f0a0a;border:1px solid #5a1a1a;color:#f87171;border-radius:8px;padding:6px 14px;font-size:13px" onclick="delTask('${task.id}')">🗑</button>
      </div>
    </div>
    <div style="border-left:4px solid ${col};padding-left:16px;margin-bottom:16px">
      <div style="font-size:11px;color:#555;margin-bottom:4px">${esc(task.project||'Bez projektu')}</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">${task.type==='mine'?'🔵':'🟡'} ${esc(task.title)}</div>
      ${task.assignee?`<div style="font-size:13px;color:#f59e0b;margin-bottom:4px">👤 ${esc(task.assignee)}</div>`:''}
      ${task.detail?`<div style="font-size:14px;color:#888;line-height:1.5">${esc(task.detail)}</div>`:''}
    </div>
    <div class="status-row">
      ${SK.map(k=>`<button class="sbtn${task.status===k?' on':''}" onclick="setStatus('${task.id}','${k}')">${ST[k]}</button>`).join('')}
    </div>
    <div class="dg">
      ${cells.map(([l,v,c])=>`<div class="dcell"><div class="dcell-lbl">${l}</div><div style="font-size:14px;font-weight:600;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div style="background:#0d0d1a;border:1px solid #1e1e3f;border-radius:12px;padding:14px">
      <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">✏️ Hlasová / textová úprava</div>
      <div style="font-size:12px;color:#333;margin-bottom:10px">Např: "přesuň na pátek", "změň prioritu na 9", "přidej do detailu: zavolat ráno"</div>
      <textarea class="vtextarea" style="min-height:65px" placeholder="Napiš příkaz k úpravě..." oninput="voiceEditText=this.value">${esc(voiceEditText)}</textarea>
      ${errMsg?`<div class="err" style="margin-top:8px">${esc(errMsg)}</div>`:''}
      <button class="btn-analyze" style="margin-top:10px" onclick="doEditAnalyze('${task.id}')" ${parsing?'disabled':''}>${parsing?'⏳ Upravuji...':'✨ Aplikovat úpravu'}</button>
    </div>
  </div>`;
}

loadTasks();
</script>
</body>
</html>
